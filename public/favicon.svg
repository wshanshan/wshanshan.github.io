<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 128 128" stroke-linecap="round" stroke-linejoin="round">
  <style>
    path, rect, line { stroke: #1e1e1e; fill: none; }
    .dot { fill: #1e1e1e; stroke: none; }
    @media (prefers-color-scheme: dark) {
      path, rect, line { stroke: #e0e0e0; }
      .dot { fill: #e0e0e0; }
    }
  </style>

  <!-- Graphite tip -->
  <circle class="dot" cx="64" cy="8" r="4"/>

  <!-- Wooden cone (pencil tip = building spire) -->
  <path stroke-width="6" d="M47 42 L64 8 L81 42"/>

  <!-- Pencil body = building facade -->
  <rect stroke-width="6" x="47" y="42" width="34" height="62" rx="2"/>

  <!-- Windows: 2 columns × 3 rows -->
  <rect stroke-width="3.5" x="52" y="50" width="10" height="9" rx="1"/>
  <rect stroke-width="3.5" x="66" y="50" width="10" height="9" rx="1"/>
  <rect stroke-width="3.5" x="52" y="66" width="10" height="9" rx="1"/>
  <rect stroke-width="3.5" x="66" y="66" width="10" height="9" rx="1"/>
  <rect stroke-width="3.5" x="52" y="82" width="10" height="9" rx="1"/>
  <rect stroke-width="3.5" x="66" y="82" width="10" height="9" rx="1"/>

  <!-- Door (centered at base of body) -->
  <path stroke-width="3.5" d="M57 104 V93 H71 V104"/>

  <!-- Eraser cap (slightly wider, rounded — pencil base) -->
  <rect stroke-width="6" x="43" y="107" width="42" height="14" rx="6"/>
</svg>
